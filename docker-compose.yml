version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nailsbysu_postgres
    environment:
      POSTGRES_USER: nailsalon
      POSTGRES_PASSWORD: nailsalon_dev
      POSTGRES_DB: nailsalon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nailsalon -d nailsalon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nailsbysu_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
